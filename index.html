<!DOCTYPE html>
<html lang="th">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDCU Night Check-in</title>

    <!-- SEO Meta Tags -->
    <meta name="google-site-verification" content="LVo329QlgQQisNaJ7dDJGmEch0tas8Ljt8tmablNOfM" />
    <meta name="description" content="ระบบเช็คอินกิจกรรม MDCU Night ซึ่งรองรับการสแกน QR Code และกรอกรหัสสำหรับเช็คชื่อน้อง">
    <meta name="keywords" content="MDCU, Check-in, MDCU Night, ระบบเช็คอิน, เช็คอินกิจกรรม, สแกนคิวอาร์โค้ด, จุฬาลงกรณ์">
    <meta name="author" content="MDCU">
    <meta name="robots" content="index, follow">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jsQR Library (Fallback) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <!-- Prompt Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f3f4f6;
        }

        #reader-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 1rem;
            overflow: hidden;
            background: #111827;
            position: relative;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scanner-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        .scanner-frame::before, .scanner-frame::after,
        .scanner-frame span::before, .scanner-frame span::after {
            content: '';
            position: absolute;
            width: 2rem;
            height: 2rem;
            border-color: #10b981;
            border-style: solid;
        }

        .scanner-frame::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 1rem; }
        .scanner-frame::after { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 1rem; }
        .scanner-frame span::before { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 1rem; }
        .scanner-frame span::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 1rem; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Badge สำหรับแจ้งเตือนสถานะ Sync */
        #syncBadge {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="app-container w-full max-w-md mx-auto space-y-4">
        <!-- Header Section -->
        <header class="w-full flex justify-between items-center py-2 px-2">
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900">ระบบเช็คชื่อน้อง</h1>
                    <!-- จุดไฟกระพริบเมื่อกำลัง Sync เบื้องหลัง -->
                    <div id="syncBadge" class="hidden w-2.5 h-2.5 bg-yellow-400 rounded-full animate-pulse" title="กำลังส่งข้อมูลพื้นหลัง..."></div>
                </div>
                <p class="text-sm font-medium text-gray-500">MDCU Night System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="APP.fetchConfigs(true)"
                    class="p-2.5 bg-white rounded-full shadow-sm border border-gray-100 text-gray-600 hover:bg-gray-50 active:scale-95 transition-all"
                    title="รีเฟรชข้อมูล">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Settings Card -->
        <div class="glass-card w-full p-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">รอบเวลา</label>
                    <div class="relative">
                        <select id="roundSelect" class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                            <option value="">กำลังโหลด...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">จุดตรวจสอบ</label>
                    <div class="relative">
                        <select id="placeSelect" class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                            <option value="">กำลังโหลด...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Action Card -->
        <div class="glass-card w-full flex-grow flex flex-col overflow-hidden">
            <!-- Custom Tabs -->
            <div class="p-2 border-b border-gray-100">
                <div class="flex bg-gray-50 p-1 rounded-xl">
                    <button id="modeScanBtn" onclick="APP.switchMode('scan')" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-gray-900 shadow-sm transition-all duration-200">สแกน QR</button>
                    <button id="modeManualBtn" onclick="APP.switchMode('manual')" class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-900 transition-all duration-200">กรอกรหัส</button>
                    <button id="modeDashBtn" onclick="APP.switchMode('dashboard')" class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-900 transition-all duration-200">สรุปยอด</button>
                </div>
            </div>

            <!-- 1. Scanner Mode -->
            <div id="scanWrapper" class="p-5 flex flex-col items-center flex-grow justify-center w-full">
                <div id="reader-container" class="shadow-inner relative">
                    <video id="video-preview" playsinline></video>

                    <div id="scan-frame" class="scanner-frame"><span></span></div>

                    <div id="camera-controls" class="absolute top-3 right-3 flex flex-col gap-2 z-20 hidden fade-in">
                        <button onclick="SCANNER.switchCamera()" class="p-2.5 bg-black/40 text-white rounded-full backdrop-blur-md border border-white/20 hover:bg-black/60 active:scale-95 transition-all shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 9v-1a2 2 0 0 0-2-2H6.5" /><path d="m9 2-4 4 4 4" /><path d="M4 15v1a2 2 0 0 0 2 2h11.5" /><path d="m15 22 4-4-4-4" /></svg>
                        </button>
                        <button id="btnFlash" onclick="SCANNER.toggleFlash()" class="p-2.5 bg-black/40 text-white rounded-full backdrop-blur-md border border-white/20 hover:bg-black/60 active:scale-95 transition-all shadow-lg hidden">
                            <svg id="iconFlash" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h2.5v7l9-10.5H13L15 2z" /></svg>
                        </button>
                    </div>

                    <canvas id="hidden-canvas" class="hidden"></canvas>

                    <div id="camera-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900/90 backdrop-blur-sm text-white transition-opacity duration-300 z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-80"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></svg>
                        <p class="text-sm font-medium">รอการเปิดกล้อง</p>
                    </div>
                </div>

                <div class="w-full mt-5 space-y-3">
                    <button id="btnStart" onclick="SCANNER.start()" class="w-full bg-gray-900 text-white text-sm font-bold py-4 rounded-xl hover:bg-black active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                        <span>เปิดกล้องสแกน</span>
                    </button>
                    <button id="btnStop" onclick="SCANNER.stop()" class="w-full bg-red-50 text-red-600 text-sm font-bold py-4 rounded-xl hidden hover:bg-red-100 active:scale-[0.98] transition-all">
                        ปิดกล้อง
                    </button>
                </div>
            </div>

            <!-- 2. Manual Mode -->
            <div id="manualWrapper" class="hidden p-6 flex flex-col items-center flex-grow justify-center w-full">
                <div class="w-full max-w-[280px] space-y-8">
                    <div class="text-center">
                        <h3 class="text-lg font-bold text-gray-900 mb-1">กรอกรหัสประจำตัว</h3>
                        <p class="text-sm text-gray-500">ระบุตัวเลข 5 หลัก</p>
                    </div>
                    <div>
                        <input type="number" id="manualIdInput" maxlength="5" placeholder="00000" oninput="if(this.value.length > 5) this.value = this.value.slice(0,5);" class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-4 text-4xl tracking-[0.2em] font-light text-center text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-inner">
                    </div>
                    <button onclick="APP.processManualEntry()" class="w-full bg-gray-900 text-white text-sm font-bold py-4 rounded-xl hover:bg-black active:scale-[0.98] transition-all">
                        ตรวจสอบข้อมูล
                    </button>
                </div>
            </div>

            <!-- 3. Dashboard Mode -->
            <div id="dashWrapper" class="hidden p-5 flex flex-col flex-grow w-full">
                <div class="flex flex-col gap-3 mb-5">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <select id="dashRoundSelect" class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                                <option value="" disabled selected hidden>กรุณาเลือกรอบ</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>
                        </div>
                        <div class="relative flex-1">
                            <select id="dashBaanSelect" class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                                <option value="" disabled selected hidden>กรุณาเลือกบ้าน</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>
                        </div>
                    </div>
                    <button onclick="APP.loadDashboard()" class="w-full bg-gray-900 text-white px-5 py-3 rounded-xl text-sm font-bold active:scale-95 transition-all">ค้นหาข้อมูล</button>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-5">
                    <div class="bg-gray-50 rounded-2xl p-3 text-center border border-gray-100 shadow-sm">
                        <div class="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-wider">ทั้งหมด</div>
                        <div id="statTotal" class="text-2xl font-black text-gray-900">-</div>
                    </div>
                    <div class="bg-green-50 rounded-2xl p-3 text-center border border-green-100 shadow-sm">
                        <div class="text-[10px] font-bold text-green-600 mb-1 uppercase tracking-wider">เช็คอินแล้ว</div>
                        <div id="statIn" class="text-2xl font-black text-green-700">-</div>
                    </div>
                    <div class="bg-red-50 rounded-2xl p-3 text-center border border-red-100 shadow-sm">
                        <div class="text-[10px] font-bold text-red-500 mb-1 uppercase tracking-wider">ยังไม่มา</div>
                        <div id="statMiss" class="text-2xl font-black text-red-600">-</div>
                    </div>
                </div>

                <div class="flex-grow overflow-hidden flex flex-col bg-gray-50 rounded-2xl border border-gray-100 p-2">
                    <div class="flex gap-1 mb-3 bg-gray-200/50 p-1 rounded-xl">
                        <button onclick="APP.toggleDashTab('missing')" id="tabMissing" class="flex-1 text-xs font-bold py-2 rounded-lg bg-white text-red-600 shadow-sm transition-all">ยังไม่มา</button>
                        <button onclick="APP.toggleDashTab('present')" id="tabPresent" class="flex-1 text-xs font-bold py-2 rounded-lg text-gray-500 hover:text-gray-700 transition-all">เช็คอินแล้ว</button>
                    </div>
                    <div id="listMissing" class="flex-grow overflow-y-auto space-y-2 pb-2 px-1">
                        <div class="text-center text-sm text-gray-400 py-8">กรุณาเลือกบ้านและกดค้นหา...</div>
                    </div>
                    <div id="listPresent" class="hidden flex-grow overflow-y-auto space-y-2 pb-2 px-1"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Toast Notification (Minimalist) เปลี่ยนให้รองรับหลายสี -->
    <div id="toastNoti" class="fixed top-5 right-5 z-[100] flex items-center gap-3 rounded-2xl px-5 py-3.5 text-white shadow-2xl transition-all duration-300 translate-x-[150%] opacity-0 pointer-events-none">
        <div class="bg-white/20 rounded-full p-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
        </div>
        <span id="toastMsg" class="font-bold text-sm tracking-wide">...</span>
    </div>

    <!-- Confirm / Error Modal System -->
    <div id="resultModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 px-4">
        <div id="modalContent" class="bg-white rounded-3xl p-6 w-full max-w-[320px] shadow-2xl transform scale-95 transition-all duration-300 flex flex-col">
            <div class="text-center mb-5">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-900">...</h3>
                <p id="modalMessage" class="text-sm text-gray-500 mt-1"></p>
            </div>

            <div id="modalUserData" class="hidden w-full fade-in mb-6">
                <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 divide-y divide-gray-100">
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">ID</span>
                        <span id="modalUserId" class="font-mono text-sm font-bold text-gray-900"></span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">ชื่อ</span>
                        <span id="modalUserName" class="text-sm font-semibold text-gray-900 text-right"></span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">บ้าน</span>
                        <span id="modalUserBaan" class="text-sm font-bold text-gray-900 bg-white px-2 py-0.5 rounded-md border border-gray-200"></span>
                    </div>
                    
                    <!-- ส่วนแสดงรายละเอียดเพิ่มเติมตอนตรวจสอบข้อมูล -->
                    <div id="modalExtraInfo" class="hidden flex-col divide-y divide-gray-100 border-t border-gray-100 mt-2">
                        <div class="flex justify-between items-center py-2 mt-1">
                            <span class="text-xs font-semibold text-gray-400">สถานที่</span>
                            <span id="modalUserPlace" class="text-sm font-medium text-blue-600 text-right"></span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-xs font-semibold text-gray-400">รอบเวลา</span>
                            <span id="modalUserRound" class="text-sm font-medium text-gray-900"></span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-xs font-semibold text-gray-400">เวลาตรวจ</span>
                            <span id="modalUserTime" class="text-sm font-medium text-gray-900 text-right"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="modalConfirmActions" class="hidden w-full flex gap-3">
                <button onclick="APP.cancelCheckIn()" class="flex-1 bg-white border border-gray-200 text-gray-700 py-3.5 rounded-xl text-sm font-bold hover:bg-gray-50 active:scale-95 transition-all">ยกเลิก</button>
                <button onclick="APP.confirmCheckIn()" class="flex-1 bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all">ยืนยัน</button>
            </div>
            <div id="modalCloseActions" class="hidden w-full">
                <button onclick="APP.closeModal()" id="btnCloseModal" class="w-full bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all">รับทราบ</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // URL จาก Google Apps Script
        // ==========================================
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuRmQ4di9yl2YuDEsvXsfx-gCJRAPLPitQnpJ7029iaTUWTBpnl5x5ZsBV2r7il-0I/exec";

        const DOM = {
            roundSelect: document.getElementById('roundSelect'),
            placeSelect: document.getElementById('placeSelect'),
            dashBaanSelect: document.getElementById('dashBaanSelect'),
            dashRoundSelect: document.getElementById('dashRoundSelect'),
            scanWrapper: document.getElementById('scanWrapper'),
            manualWrapper: document.getElementById('manualWrapper'),
            dashWrapper: document.getElementById('dashWrapper'),
            modeScanBtn: document.getElementById('modeScanBtn'),
            modeManualBtn: document.getElementById('modeManualBtn'),
            modeDashBtn: document.getElementById('modeDashBtn'),
            manualIdInput: document.getElementById('manualIdInput'),
            cameraOverlay: document.getElementById('camera-overlay'),
            scanFrame: document.getElementById('scan-frame'),
            cameraControls: document.getElementById('camera-controls'),
            btnFlash: document.getElementById('btnFlash'),
            iconFlash: document.getElementById('iconFlash'),
            btnStart: document.getElementById('btnStart'),
            btnStop: document.getElementById('btnStop'),
            resultModal: document.getElementById('resultModal'),
            modalContent: document.getElementById('modalContent'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            modalUserData: document.getElementById('modalUserData'),
            modalUserId: document.getElementById('modalUserId'),
            modalUserName: document.getElementById('modalUserName'),
            modalUserBaan: document.getElementById('modalUserBaan'),
            modalExtraInfo: document.getElementById('modalExtraInfo'),
            modalUserRound: document.getElementById('modalUserRound'),
            modalUserPlace: document.getElementById('modalUserPlace'),
            modalUserTime: document.getElementById('modalUserTime'),
            modalConfirmActions: document.getElementById('modalConfirmActions'),
            modalCloseActions: document.getElementById('modalCloseActions'),
            btnCloseModal: document.getElementById('btnCloseModal'),
            statTotal: document.getElementById('statTotal'),
            statIn: document.getElementById('statIn'),
            statMiss: document.getElementById('statMiss'),
            tabMissing: document.getElementById('tabMissing'),
            tabPresent: document.getElementById('tabPresent'),
            listMissing: document.getElementById('listMissing'),
            listPresent: document.getElementById('listPresent'),
            toastNoti: document.getElementById('toastNoti'),
            toastMsg: document.getElementById('toastMsg'),
            syncBadge: document.getElementById('syncBadge'),
        };

        async function fetchAPI(action, data = {}) {
            try {
                const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, data: data })
                });
                const textResult = await response.text();
                return JSON.parse(textResult);
            } catch (error) {
                console.error("API Fetch Error:", error);
                throw new Error("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาตรวจสอบอินเทอร์เน็ต");
            }
        }

        const SCANNER = {
            video: document.getElementById('video-preview'),
            canvas: document.getElementById('hidden-canvas'),
            isScanning: false,
            stream: null,
            currentFacingMode: 'environment',
            isTorchOn: false,
            videoTrack: null,

            start: async function () {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    APP.showError("เบราว์เซอร์ไม่รองรับ", "กรุณาใช้ Chrome หรือ Safari เวอร์ชั่นล่าสุด");
                    return;
                }

                try {
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }

                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            facingMode: this.currentFacingMode, 
                            width: { ideal: 720 }, 
                            height: { ideal: 720 },
                            advanced: [{ focusMode: "continuous" }]
                        }
                    });

                    this.video.srcObject = this.stream;
                    this.video.setAttribute("playsinline", true);
                    this.videoTrack = this.stream.getVideoTracks()[0];

                    const settings = this.videoTrack.getSettings();
                    if (settings.facingMode === 'user' || this.currentFacingMode === 'user') {
                        this.video.style.transform = "scaleX(-1)";
                    } else {
                        this.video.style.transform = "scaleX(1)";
                    }

                    this.video.onloadedmetadata = () => {
                        this.video.play();
                        this.isScanning = true;

                        DOM.cameraOverlay.style.opacity = '0';
                        setTimeout(() => DOM.cameraOverlay.style.display = 'none', 300);

                        DOM.scanFrame.style.display = 'block';
                        DOM.cameraControls.classList.remove('hidden');

                        const hasTorch = this.videoTrack.getCapabilities && this.videoTrack.getCapabilities().torch;
                        if (hasTorch && this.currentFacingMode === 'environment') {
                            DOM.btnFlash.classList.remove('hidden');
                        } else {
                            DOM.btnFlash.classList.add('hidden');
                        }

                        DOM.btnStart.classList.add('hidden');
                        DOM.btnStop.classList.remove('hidden');
                        requestAnimationFrame(() => this.tick());
                    };
                } catch (err) {
                    APP.showError("ไม่สามารถเข้าถึงกล้องได้", "หากระบบบล็อกกล้อง ให้ตรวจสอบสิทธิ์กล้องในการตั้งค่าเบราว์เซอร์");
                }
            },

            switchCamera: function () {
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                this.isTorchOn = false;
                DOM.iconFlash.setAttribute('fill', 'none');
                DOM.cameraOverlay.style.display = 'flex';
                DOM.cameraOverlay.style.opacity = '1';
                DOM.scanFrame.style.display = 'none';
                DOM.cameraControls.classList.add('hidden');
                this.start();
            },

            toggleFlash: async function () {
                if (this.videoTrack) {
                    try {
                        const capabilities = this.videoTrack.getCapabilities();
                        if (capabilities.torch) {
                            this.isTorchOn = !this.isTorchOn;
                            await this.videoTrack.applyConstraints({
                                advanced: [{ torch: this.isTorchOn }]
                            });
                            if (this.isTorchOn) {
                                DOM.iconFlash.setAttribute('fill', 'currentColor');
                                DOM.iconFlash.classList.add('text-yellow-400');
                            } else {
                                DOM.iconFlash.setAttribute('fill', 'none');
                                DOM.iconFlash.classList.remove('text-yellow-400');
                            }
                        }
                    } catch (err) {}
                }
            },

            tick: function () {
                if (this.video.readyState === this.video.HAVE_ENOUGH_DATA && this.isScanning) {
                    const ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                    const vW = this.video.videoWidth;
                    const vH = this.video.videoHeight;
                    const cropSize = Math.min(vW, vH) * 0.7; 
                    const startX = (vW - cropSize) / 2;
                    const startY = (vH - cropSize) / 2;

                    this.canvas.width = 300;
                    this.canvas.height = 300;
                    
                    ctx.drawImage(this.video, startX, startY, cropSize, cropSize, 0, 0, 300, 300);
                    const imageData = ctx.getImageData(0, 0, 300, 300);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                    if (code && code.data && !APP.isProcessing) {
                        this.pause();
                        if (navigator.vibrate) navigator.vibrate(200); 
                        APP.verifyUser(code.data);
                        return; // เจอโค้ดแล้ว หยุดทำลูปชั่วคราว
                    }
                }
                
                if (this.isScanning) requestAnimationFrame(() => this.tick());
            },

            stop: function () {
                this.isScanning = false;
                this.isTorchOn = false;
                if (this.stream) this.stream.getTracks().forEach(track => track.stop());
                this.video.srcObject = null;
                this.videoTrack = null;

                DOM.scanFrame.style.display = 'none';
                DOM.cameraControls.classList.add('hidden');
                DOM.iconFlash.setAttribute('fill', 'none');
                DOM.iconFlash.classList.remove('text-yellow-400');

                DOM.cameraOverlay.style.display = 'flex';
                void DOM.cameraOverlay.offsetWidth;
                DOM.cameraOverlay.style.opacity = '1';

                DOM.btnStop.classList.add('hidden');
                DOM.btnStart.classList.remove('hidden');
            },

            pause: function () {
                this.isScanning = false;
                DOM.scanFrame.style.display = 'none';
                DOM.cameraOverlay.style.display = 'flex';
                DOM.cameraOverlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            },
            
            resume: function () {
                if (!this.isScanning && this.stream && this.stream.active) {
                    this.isScanning = true;
                    DOM.scanFrame.style.display = 'block';
                    DOM.cameraOverlay.style.display = 'none';
                    DOM.cameraOverlay.style.backgroundColor = '';
                    requestAnimationFrame(() => this.tick());
                } else if (!this.stream || !this.stream.active) {
                    this.start();
                }
            }
        };

        const APP = {
            currentMode: "scan",
            isProcessing: false,
            pendingId: null,
            lastUserData: null,
            toastTimeout: null,
            isSyncing: false,

            init: function () {
                this.fetchConfigs(false);
                // พยายามดึงคิวที่ค้างไว้ส่งขึ้น Server ทุกๆ 10 วินาที (เผื่อเน็ตหลุด)
                setInterval(() => this.processSyncQueue(), 10000);
            },

            switchMode: function (mode) {
                if (this.currentMode === mode) return;
                this.currentMode = mode;

                const activeTabClass = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-gray-900 shadow-sm transition-all duration-200";
                const inactiveTabClass = "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-900 transition-all duration-200";

                DOM.modeScanBtn.className = mode === 'scan' ? activeTabClass : inactiveTabClass;
                DOM.modeManualBtn.className = mode === 'manual' ? activeTabClass : inactiveTabClass;
                DOM.modeDashBtn.className = mode === 'dashboard' ? activeTabClass : inactiveTabClass;

                DOM.scanWrapper.classList.toggle('hidden', mode !== 'scan');
                DOM.manualWrapper.classList.toggle('hidden', mode !== 'manual');
                DOM.dashWrapper.classList.toggle('hidden', mode !== 'dashboard');

                if (mode === 'scan') SCANNER.resume();
                else SCANNER.stop();

                if (mode === 'manual') DOM.manualIdInput.focus();
            },

            renderConfigs: function(data) {
                // จำค่าปัจจุบันที่เลือกไว้ก่อน
                const currentPlace = DOM.placeSelect.value;
                const currentRound = DOM.roundSelect.value;
                const currentDashRound = DOM.dashRoundSelect.value;
                const currentDashBaan = DOM.dashBaanSelect.value;

                DOM.placeSelect.innerHTML = data.places.map(p => `<option value="${p}">${p}</option>`).join('');
                DOM.roundSelect.innerHTML = data.times.map(t => `<option value="${t}">${t}</option>`).join('');
                DOM.dashRoundSelect.innerHTML = '<option value="" disabled selected hidden>กรุณาเลือกรอบ</option>' + data.times.map(t => `<option value="${t}">${t}</option>`).join('');
                if (data.baans) {
                    DOM.dashBaanSelect.innerHTML = '<option value="" disabled selected hidden>กรุณาเลือกบ้าน</option>' + data.baans.map(b => `<option value="${b}">${b}</option>`).join('');
                }

                // เซ็ตค่ากลับไปเป็นค่าเดิมที่เคยเลือกไว้ (ถ้ามี)
                if (currentPlace) DOM.placeSelect.value = currentPlace;
                if (currentRound) DOM.roundSelect.value = currentRound;
                if (currentDashRound) DOM.dashRoundSelect.value = currentDashRound;
                if (currentDashBaan) DOM.dashBaanSelect.value = currentDashBaan;
            },

            fetchConfigs: async function (forceRefresh = false) {
                if(!forceRefresh) {
                    const cachedData = localStorage.getItem('mdcu_app_configs');
                    if (cachedData) {
                        try { this.renderConfigs(JSON.parse(cachedData)); } catch(e){}
                    }
                }

                try {
                    const data = await fetchAPI("getConfigs");
                    if (data.status === "success") {
                        localStorage.setItem('mdcu_app_configs', JSON.stringify(data));
                        
                        if(data.users) {
                            localStorage.setItem('mdcu_users_cache', JSON.stringify(data.users));
                        }

                        this.renderConfigs(data);
                    } else if (forceRefresh) {
                        this.showError("ไม่สามารถโหลดตั้งค่าได้", data.message);
                    }
                } catch (err) {
                    if(!localStorage.getItem('mdcu_app_configs') || forceRefresh) {
                        DOM.placeSelect.innerHTML = '<option value="">เชื่อมต่อ API ไม่ได้</option>';
                        DOM.roundSelect.innerHTML = '<option value="">เชื่อมต่อ API ไม่ได้</option>';
                        this.showError("เกิดข้อผิดพลาด", err.message);
                    }
                }
            },

            verifyUser: async function (rawId) {
                if (this.isProcessing) return;

                const id = String(rawId).trim();
                if (!/^\d{5}$/.test(id)) {
                    this.showError("ข้อมูลไม่ถูกต้อง", "คิวอาร์โค้ดหรือรหัสไม่ตรงตามรูปแบบ (ตัวเลข 5 หลัก)");
                    return;
                }

                this.isProcessing = true;
                this.pendingId = id;

                // อ่านข้อมูลแบบ 0 วินาที จาก Local Cache (ถ้ามี)
                try {
                    const cachedUsers = JSON.parse(localStorage.getItem('mdcu_users_cache'));
                    if (cachedUsers && cachedUsers[id]) {
                        this.openModal("confirm", "ตรวจสอบข้อมูล", "ยืนยันการทำรายการหรือไม่?", cachedUsers[id]);
                        return;
                    }
                } catch(e) {}

                // ถ้าไม่เจอใน Cache ให้โหลดผ่านเน็ตตามปกติ
                this.openModal("loading", "กำลังค้นหาข้อมูล", `ID: ${id}`);
                try {
                    const res = await fetchAPI("verifyUser", { id: id });
                    if (res.status === 'success') {
                        this.openModal("confirm", "ตรวจสอบข้อมูล", "ยืนยันการทำรายการหรือไม่?", res.data);
                    } else {
                        this.openModal("error", "ไม่พบข้อมูล", res.message || "ไม่มีข้อมูลรหัสนี้ในระบบ");
                    }
                } catch (err) {
                    this.openModal("error", "ขัดข้อง", err.message || "ไม่สามารถติดต่อฐานข้อมูลได้");
                }
            },

            processManualEntry: function () {
                const val = DOM.manualIdInput.value;
                if (val.length === 5) {
                    this.verifyUser(val);
                } else {
                    this.showError("รหัสไม่ครบถ้วน", "กรุณากรอกรหัสประจำตัวให้ครบ 5 หลัก");
                }
            },

            confirmCheckIn: function () {
                const id = this.pendingId;
                const round = DOM.roundSelect.value;
                const place = DOM.placeSelect.value;

                if (!round || !place || round === "" || place === "") {
                    this.showError("ข้อมูลไม่ครบ", "กรุณาเลือกรอบเวลาและจุดตรวจสอบด้านบนให้เรียบร้อย");
                    return;
                }

                // 1. ปิดหน้าต่างทันที เพื่อให้หน้าจอกลับมาพร้อมแสกนคนต่อไปได้เลย (Non-blocking)
                this.closeModal();
                DOM.manualIdInput.value = '';

                // 2. เรียก API ไปหาเซิร์ฟเวอร์แบบ Asynchronous 
                fetchAPI("processCheckIn", { id: id, round: round, place: place })
                    .then(res => {
                        // 3. เมื่อได้ผลลัพธ์กลับมาจริงๆ ค่อยเด้ง Toast แจ้งเตือนการเขียนสำเร็จ
                        if (res.status === 'success' || (res.message && res.message.includes('แล้ว'))) {
                            const nickname = this.lastUserData?.nickname ? String(this.lastUserData.nickname).trim() : '';
                            const label = nickname ? `น้อง${nickname} (${id})` : id;
                            this.showToast(`เช็คอินสำเร็จ: ${label}`, "bg-emerald-500"); 
                            this.playBeep(); 
                        } else {
                            this.showToast(`ผิดพลาด (${id}): ${res.message}`, "bg-red-500");
                        }
                    })
                    .catch(err => {
                        // 4. กรณีเน็ตหลุดระหว่างทาง ค่อยดึงข้อมูลลงคิวออฟไลน์เพื่อส่งทีหลัง
                        this.showToast(`ออฟไลน์: บันทึก ${id} ลงเครื่อง`, "bg-yellow-500");
                        
                        const queueData = {
                            reqId: Date.now() + "_" + Math.random().toString(36).substr(2, 9),
                            id: id, round: round, place: place, timestamp: new Date().toISOString()
                        };
                        let queue = JSON.parse(localStorage.getItem('mdcu_checkin_queue') || '[]');
                        queue.push(queueData);
                        localStorage.setItem('mdcu_checkin_queue', JSON.stringify(queue));
                        
                        this.processSyncQueue();
                    });
            },

            processSyncQueue: async function() {
                if(this.isSyncing) return;
                
                let queue = JSON.parse(localStorage.getItem('mdcu_checkin_queue') || '[]');
                if(queue.length === 0) {
                    DOM.syncBadge.classList.add('hidden');
                    return;
                }

                this.isSyncing = true;
                DOM.syncBadge.classList.remove('hidden');

                let remainingQueue = [...queue];

                for(let i = 0; i < queue.length; i++) {
                    let task = queue[i];
                    try {
                        const res = await fetchAPI("processCheckIn", { id: task.id, round: task.round, place: task.place });
                        if (res.status === 'success' || (res.message && res.message.includes('แล้ว'))) {
                            remainingQueue = remainingQueue.filter(q => q.reqId !== task.reqId);
                            localStorage.setItem('mdcu_checkin_queue', JSON.stringify(remainingQueue));
                            
                            // แจ้งเตือนเมื่อส่งข้อมูลที่ค้างอยู่สำเร็จ
                            this.showToast(`ซิงค์ ${task.id} สำเร็จ!`, "bg-emerald-500");
                        }
                    } catch (err) {
                        break; // ขัดข้องทางเครือข่าย หยุดส่งก่อน
                    }
                }

                this.isSyncing = false;
                if(remainingQueue.length === 0) {
                    DOM.syncBadge.classList.add('hidden');
                }
            },

            showToast: function(message, bgClass = "bg-emerald-500") {
                DOM.toastMsg.innerText = message || "สำเร็จ!";
                
                // รีเซ็ต Class ทั้งหมดและใส่สีที่ต้องการ
                DOM.toastNoti.className = `fixed top-5 right-5 z-[100] flex items-center gap-3 rounded-2xl px-5 py-3.5 text-white shadow-2xl transition-all duration-300 translate-x-[150%] opacity-0 pointer-events-none ${bgClass}`;
                
                // บังคับให้เบราว์เซอร์รับรู้การเปลี่ยน Class (Reflow) ก่อนลบคำสั่งซ่อน
                void DOM.toastNoti.offsetWidth;
                DOM.toastNoti.classList.remove('translate-x-[150%]', 'opacity-0');
                
                if (this.toastTimeout) clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => {
                    DOM.toastNoti.classList.add('translate-x-[150%]', 'opacity-0');
                }, 2500); // ให้อยู่นานขึ้นนิดนึง (2.5 วิ) เพื่อให้อ่านรหัสทัน
            },

            toggleDashTab: function (tab) {
                const activeCls = "flex-1 text-xs font-bold py-2 rounded-lg shadow-sm transition-all bg-white ";
                const inactiveCls = "flex-1 text-xs font-bold py-2 rounded-lg transition-all text-gray-500 hover:text-gray-700";

                if (tab === 'missing') {
                    DOM.tabMissing.className = activeCls + "text-red-600";
                    DOM.tabPresent.className = inactiveCls;
                    DOM.listMissing.classList.remove('hidden');
                    DOM.listPresent.classList.add('hidden');
                } else {
                    DOM.tabPresent.className = activeCls + "text-green-600";
                    DOM.tabMissing.className = inactiveCls;
                    DOM.listPresent.classList.remove('hidden');
                    DOM.listMissing.classList.add('hidden');
                }
            },

            loadDashboard: async function () {
                const baan = DOM.dashBaanSelect.value;
                const round = DOM.dashRoundSelect.value;
                if (!baan || !round) return alert("กรุณาเลือกรอบเวลาและเลือกบ้าน ให้ครบถ้วนก่อนกดค้นหา");

                DOM.statTotal.innerText = "..."; DOM.statIn.innerText = "..."; DOM.statMiss.innerText = "...";
                DOM.listMissing.innerHTML = `<div class="text-center text-sm text-gray-400 py-8">กำลังโหลดข้อมูล...</div>`;
                DOM.listPresent.innerHTML = `<div class="text-center text-sm text-gray-400 py-8">กำลังโหลดข้อมูล...</div>`;

                try {
                    const res = await fetchAPI("getDashboardData", { baan: baan, round: round });
                    if (res.status === "success") {
                        DOM.statTotal.innerText = res.summary.total;
                        DOM.statIn.innerText = res.summary.checkedIn;
                        DOM.statMiss.innerText = res.summary.missing;

                        DOM.listMissing.innerHTML = res.missingList.length === 0
                            ? `<div class="text-center text-sm text-green-600 py-8 font-bold">มาครบทุกคนแล้ว</div>`
                            : res.missingList.map(u => `
                                <div class="bg-white p-3 rounded-xl border border-red-100 flex justify-between items-center shadow-sm">
                                    <div><div class="text-xs font-mono text-gray-500">${u.id}</div><div class="text-sm font-bold text-gray-900">${u.name}</div></div>
                                    <div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
                                </div>
                            `).join('');

                        DOM.listPresent.innerHTML = res.checkedInList.length === 0
                            ? `<div class="text-center text-sm text-gray-400 py-8">ยังไม่มีผู้เช็คอิน</div>`
                            : res.checkedInList.map(u => {
                                // แปลง Object ให้กลายเป็น String เผื่อกรณีที่ข้อมูลเวลาเป็น Object
                                let timeDisplay = u.time;
                                if (typeof u.time === 'object' && u.time !== null) {
                                    timeDisplay = JSON.stringify(u.time);
                                } else if (u.time === undefined || u.time === null) {
                                    timeDisplay = '-';
                                }

                                return `
                                <div class="bg-white p-3 rounded-xl border border-green-100 flex justify-between items-center shadow-sm">
                                    <div><div class="text-xs font-mono text-gray-500">${u.id}</div><div class="text-sm font-bold text-gray-900">${u.name}</div></div>
                                    <div class="text-right"><div class="text-xs font-bold text-green-600">${timeDisplay} น.</div><div class="text-[10px] text-gray-500 truncate max-w-[80px]">${u.place}</div></div>
                                </div>
                                `
                            }).join('');
                    } else {
                        alert(res.message);
                    }
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อเพื่อดึงข้อมูลสรุปยอด");
                }
            },

            showError: function (title, msg) {
                this.isProcessing = true;
                SCANNER.pause();
                this.openModal("error", title, msg);
            },

            openModal: function (state, title, msg, data = null) {
                DOM.resultModal.classList.remove('opacity-0', 'pointer-events-none');
                DOM.modalContent.classList.remove('scale-95');
                DOM.modalContent.classList.add('scale-100');

                DOM.modalTitle.innerText = title;
                DOM.modalMessage.innerText = msg;

                DOM.modalConfirmActions.classList.add('hidden');
                DOM.modalCloseActions.classList.add('hidden');
                DOM.modalUserData.classList.add('hidden');
                DOM.modalExtraInfo.classList.remove('flex');
                DOM.modalExtraInfo.classList.add('hidden');
                DOM.modalTitle.className = "text-xl font-bold text-gray-900";

                if (state === "loading") {
                    // Just text
                } else if (state === "confirm") {
                    DOM.modalUserData.classList.remove('hidden');
                    DOM.modalUserId.innerText = this.pendingId;
                    DOM.modalUserName.innerText = `${data.firstName || ''} ${data.lastName || ''} ${data.nickname ? '(' + data.nickname + ')' : ''}`.trim();
                    DOM.modalUserBaan.innerText = data.baan || '-';
                    
                    DOM.modalExtraInfo.classList.remove('hidden');
                    DOM.modalExtraInfo.classList.add('flex');
                    DOM.modalUserPlace.innerText = DOM.placeSelect.options[DOM.placeSelect.selectedIndex]?.text || '-';
                    DOM.modalUserRound.innerText = DOM.roundSelect.options[DOM.roundSelect.selectedIndex]?.text || '-';
                    DOM.modalUserTime.innerText = new Date().toLocaleTimeString('th-TH');

                    DOM.modalConfirmActions.classList.remove('hidden');
                } else if (state === "error") {
                    DOM.modalTitle.className = "text-xl font-bold text-red-600";
                    DOM.modalCloseActions.classList.remove('hidden');
                    DOM.btnCloseModal.className = "w-full bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all";
                }
            },

            closeModal: function () {
                DOM.resultModal.classList.add('opacity-0', 'pointer-events-none');
                DOM.modalContent.classList.add('scale-95');
                DOM.modalContent.classList.remove('scale-100');

                this.isProcessing = false;

                if (this.currentMode === 'scan') {
                    // กลับมาแสกนต่อรวดเร็ว
                    setTimeout(() => SCANNER.resume(), 300);
                } else {
                    DOM.manualIdInput.focus();
                }
            },

            cancelCheckIn: function () {
                this.closeModal();
            },

            playBeep: function () {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.3;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } catch (e) {}
            }
        };

        window.APP = APP;
        window.SCANNER = SCANNER;
