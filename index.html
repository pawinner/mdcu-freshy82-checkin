    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
            /* bg-gray-100 */
            color: #111827;
            -webkit-tap-highlight-color: transparent;
        }

        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f3f4f6;
        }

        #reader-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 1rem;
            overflow: hidden;
            background: #111827;
            /* Dark bg before camera loads */
            position: relative;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* กลับซ้ายขวาให้เหมือนกระจก (สำหรับกล้องหน้า) ถ้าใช้กล้องหลังให้เอาออกผ่าน JS */
        }

        /* กรอบโฟกัส QR Code สไตล์ Clean */
        .scanner-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
            /* ทำให้รอบนอกมืดลง */
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        /* มุมของกรอบโฟกัส */
        .scanner-frame::before,
        .scanner-frame::after,
        .scanner-frame span::before,
        .scanner-frame span::after {
            content: '';
            position: absolute;
            width: 2rem;
            height: 2rem;
            border-color: #ffffff;
            border-style: solid;
        }

        .scanner-frame::before {
            top: -2px;
            left: -2px;
            border-width: 3px 0 0 3px;
            border-top-left-radius: 1rem;
        }

        .scanner-frame::after {
            top: -2px;
            right: -2px;
            border-width: 3px 3px 0 0;
            border-top-right-radius: 1rem;
        }

        .scanner-frame span::before {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 3px 3px;
            border-bottom-left-radius: 1rem;
        }

        .scanner-frame span::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 3px 3px 0;
            border-bottom-right-radius: 1rem;
        }


        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="app-container w-full max-w-md mx-auto space-y-4">

        <!-- Header Section -->
        <header class="w-full flex justify-between items-center py-2 px-2">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">Check-in</h1>
                <p class="text-sm font-medium text-gray-500">MDCU Night System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="APP.fetchConfigs()"
                    class="p-2.5 bg-white rounded-full shadow-sm border border-gray-100 text-gray-600 hover:bg-gray-50 active:scale-95 transition-all"

                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Settings Card -->
        <div class="glass-card w-full p-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                    <label
                        class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">รอบเวลา</label>
                    <div class="relative">
                        <select id="roundSelect"
                            class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                            <option value="">กำลังโหลด...</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col">
                    <label
                        class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">จุดตรวจสอบ</label>
                    <div class="relative">
                        <select id="placeSelect"
                            class="w-full appearance-none bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all">
                            <option value="">กำลังโหลด...</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Action Card -->
        <div class="glass-card w-full flex-grow flex flex-col overflow-hidden">

            <!-- Custom Tabs -->
            <div class="p-2 border-b border-gray-100">
                <div class="flex bg-gray-50 p-1 rounded-xl">
                    <button id="modeScanBtn" onclick="APP.switchMode('scan')"
                        class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white text-gray-900 shadow-sm transition-all duration-200">
                        สแกน QR
                    </button>
                    <button id="modeManualBtn" onclick="APP.switchMode('manual')"
                        class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-900 transition-all duration-200">
                        กรอกรหัส
                    </button>
                </div>
            </div>

            <!-- Scanner Mode -->
            <div id="scanWrapper" class="p-5 flex flex-col items-center flex-grow justify-center w-full">

                <div id="reader-container" class="shadow-inner">
                    <video id="video-preview" playsinline></video>

                    <!-- Clean Focus Frame -->
                    <div id="scan-frame" class="scanner-frame"><span></span></div>

                    <!-- Camera Controls (Floating Buttons) -->
                    <div id="camera-controls" class="absolute top-3 right-3 flex flex-col gap-2 z-20 hidden fade-in">
                        <button onclick="SCANNER.switchCamera()"
                            class="p-2.5 bg-black/40 text-white rounded-full backdrop-blur-md border border-white/20 hover:bg-black/60 active:scale-95 transition-all shadow-lg"
                            title="สลับกล้อง">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M20 9v-1a2 2 0 0 0-2-2H6.5" />
                                <path d="m9 2-4 4 4 4" />
                                <path d="M4 15v1a2 2 0 0 0 2 2h11.5" />
                                <path d="m15 22 4-4-4-4" />
                            </svg>
                        </button>
                        <button id="btnFlash" onclick="SCANNER.toggleFlash()"
                            class="p-2.5 bg-black/40 text-white rounded-full backdrop-blur-md border border-white/20 hover:bg-black/60 active:scale-95 transition-all shadow-lg hidden"
                            title="เปิด/ปิด แฟลช">
                            <svg id="iconFlash" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 2H6a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h2.5v7l9-10.5H13L15 2z" />
                            </svg>
                        </button>
                    </div>

                    <canvas id="hidden-canvas" class="hidden"></canvas>

                    <!-- Loading/Start Overlay -->
                    <div id="camera-overlay"
                        class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900/90 backdrop-blur-sm text-white transition-opacity duration-300 z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                            class="mb-3 opacity-80">
                            <path
                                d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                            <circle cx="12" cy="13" r="3" />
                        </svg>
                        <p class="text-sm font-medium">รอการเปิดกล้อง</p>
                    </div>
                </div>

                <div class="w-full mt-5 space-y-3">
                    <button id="btnStart" onclick="SCANNER.start()"
                        class="w-full bg-gray-900 text-white text-sm font-bold py-4 rounded-xl hover:bg-black active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                        <span>เปิดกล้องสแกน</span>
                    </button>
                    <button id="btnStop" onclick="SCANNER.stop()"
                        class="w-full bg-red-50 text-red-600 text-sm font-bold py-4 rounded-xl hidden hover:bg-red-100 active:scale-[0.98] transition-all">
                        ปิดกล้อง
                    </button>
                </div>
            </div>

            <!-- Manual Mode -->
            <div id="manualWrapper" class="hidden p-6 flex flex-col items-center flex-grow justify-center w-full">
                <div class="w-full max-w-[280px] space-y-8">
                    <div class="text-center">
                        <h3 class="text-lg font-bold text-gray-900 mb-1">กรอกรหัสประจำตัว</h3>
                        <p class="text-sm text-gray-500">ระบุตัวเลข 5 หลัก</p>
                    </div>

                    <div>
                        <input type="number" id="manualIdInput" maxlength="5" placeholder="00000"
                            oninput="if(this.value.length > 5) this.value = this.value.slice(0,5);"
                            class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-4 text-4xl tracking-[0.2em] font-light text-center text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-inner">
                    </div>

                    <button onclick="APP.processManualEntry()"
                        class="w-full bg-gray-900 text-white text-sm font-bold py-4 rounded-xl hover:bg-black active:scale-[0.98] transition-all">
                        ตรวจสอบข้อมูล
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Minimalist Modal System -->
    <div id="resultModal"
        class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 px-4">
        <div id="modalContent"
            class="bg-white rounded-3xl p-6 w-full max-w-[320px] shadow-2xl transform scale-95 transition-all duration-300 flex flex-col">

            <div class="text-center mb-5">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-900">...</h3>
                <p id="modalMessage" class="text-sm text-gray-500 mt-1"></p>
            </div>

            <!-- User Info Display (Clean layout) -->
            <div id="modalUserData" class="hidden w-full fade-in mb-6">
                <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 divide-y divide-gray-100">
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">ID</span>
                        <span id="modalUserId" class="font-mono text-sm font-bold text-gray-900"></span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">ชื่อ</span>
                        <span id="modalUserName" class="text-sm font-semibold text-gray-900 text-right"></span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-semibold text-gray-400">บ้าน</span>
                        <span id="modalUserBaan"
                            class="text-sm font-bold text-gray-900 bg-white px-2 py-0.5 rounded-md border border-gray-200"></span>
                    </div>

                    <!-- ส่วนแสดงรายละเอียดเพิ่มเติมตอนเช็คอินสำเร็จ -->
                    <div id="modalExtraInfo" class="hidden flex-col divide-y divide-gray-100 border-t border-gray-100">
                        <div class="flex justify-between items-center py-2 mt-1">
                            <span class="text-xs font-semibold text-gray-400">รอบเวลา</span>
                            <span id="modalUserRound" class="text-sm font-medium text-gray-900"></span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-xs font-semibold text-gray-400">สถานที่</span>
                            <span id="modalUserPlace" class="text-sm font-medium text-gray-900 text-right"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="modalConfirmActions" class="hidden w-full flex gap-3">
                <button onclick="APP.cancelCheckIn()"
                    class="flex-1 bg-white border border-gray-200 text-gray-700 py-3.5 rounded-xl text-sm font-bold hover:bg-gray-50 active:scale-95 transition-all">ยกเลิก</button>
                <button onclick="APP.confirmCheckIn()"
                    class="flex-1 bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all">ยืนยัน</button>
            </div>

            <div id="modalCloseActions" class="hidden w-full">
                <button onclick="APP.closeModal()" id="btnCloseModal"
                    class="w-full bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all">รับทราบ</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. นำ URL จาก Google Apps Script (Deploy > Web App) มาวางที่นี่
        // ==========================================
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfD9uFMOokYU-sLzPtN7gFtPTZykNY0h86Ui_Bz3kLxpQOGoOJT_DclsielV01tJ9M/exec";

        const DOM = {
            roundSelect: document.getElementById('roundSelect'),
            placeSelect: document.getElementById('placeSelect'),
            scanWrapper: document.getElementById('scanWrapper'),
            manualWrapper: document.getElementById('manualWrapper'),
            modeScanBtn: document.getElementById('modeScanBtn'),
            modeManualBtn: document.getElementById('modeManualBtn'),
            manualIdInput: document.getElementById('manualIdInput'),
            cameraOverlay: document.getElementById('camera-overlay'),
            scanFrame: document.getElementById('scan-frame'),
            cameraControls: document.getElementById('camera-controls'),
            btnFlash: document.getElementById('btnFlash'),
            iconFlash: document.getElementById('iconFlash'),
            btnStart: document.getElementById('btnStart'),
            btnStop: document.getElementById('btnStop'),
            resultModal: document.getElementById('resultModal'),
            modalContent: document.getElementById('modalContent'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            modalUserData: document.getElementById('modalUserData'),
            modalUserId: document.getElementById('modalUserId'),
            modalUserName: document.getElementById('modalUserName'),
            modalUserBaan: document.getElementById('modalUserBaan'),
            modalExtraInfo: document.getElementById('modalExtraInfo'),
            modalUserRound: document.getElementById('modalUserRound'),
            modalUserPlace: document.getElementById('modalUserPlace'),
            modalConfirmActions: document.getElementById('modalConfirmActions'),
            modalCloseActions: document.getElementById('modalCloseActions'),
            btnCloseModal: document.getElementById('btnCloseModal')
        };

        // ==========================================
        // 2. ฟังก์ชันช่วยสำหรับคุยกับ Google Apps Script (REST API)
        // ==========================================
        async function fetchAPI(action, data = {}) {
            if (GOOGLE_APP_SCRIPT_URL === "ใส่_URL_ของ_WEB_APP_ที่นี่" || !GOOGLE_APP_SCRIPT_URL) {
                console.warn("ยังไม่ได้ตั้งค่า GOOGLE_APP_SCRIPT_URL ระบบกำลังใช้ข้อมูลจำลอง (Mock Data)");

                return new Promise(resolve => {
                    setTimeout(() => {
                        if (action === "getConfigs") {
                            resolve({
                                status: "success",
                                places: ["อาคารแพทยพัฒน์ (Mock)", "ลานเกียร์ (Mock)"],
                                times: ["รอบเย็น (Mock)", "รอบดึก (Mock)"]
                            });
                        } else if (action === "verifyUser") {
                            if (data.id === "00000") {
                                resolve({ status: "error", message: "ไม่พบข้อมูลรหัสประจำตัวในระบบจำลอง" });
                            } else {
                                resolve({
                                    status: "success",
                                    data: { firstName: "สมชาย", lastName: "ใจดี", nickname: "เอ", baan: "สราญ" }
                                });
                            }
                        } else if (action === "processCheckIn") {
                            resolve({ status: "success", data: { firstName: "สมชาย", lastName: "ใจดี", nickname: "เอ", baan: "สราญ" } });
                        }
                    }, 500);
                });
            }

            try {
                const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, data: data })
                });

                // อ่านข้อมูลที่ได้กลับมาเป็นข้อความก่อน (เพื่อดักจับ Error ที่เป็น HTML)
                const textResult = await response.text();

                try {
                    // พยายามแปลงเป็น JSON
                    return JSON.parse(textResult);
                } catch (jsonErr) {
                    console.error("API Response was not JSON:", textResult);
                    throw new Error("เซิร์ฟเวอร์ไม่ได้ตอบกลับเป็น JSON (อาจตั้งค่าสิทธิ์ Web App ผิดเป็นจำกัดการเข้าถึง)");
                }

            } catch (error) {
                console.error("API Fetch Error:", error);

                // ตรวจสอบข้อความแจ้งเตือนที่เข้าใจง่ายขึ้น
                if (error.message === "Failed to fetch") {
                    throw new Error("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ (CORS Error หรือ URL ผิด)");
                }
                throw error;
            }
        }

        const SCANNER = {
            video: document.getElementById('video-preview'),
            canvas: document.getElementById('hidden-canvas'),
            isScanning: false,
            stream: null,
            currentFacingMode: 'environment', // กล้องหลังเป็นค่าเริ่มต้น
            isTorchOn: false,
            videoTrack: null,

            start: async function () {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    APP.showError("เบราว์เซอร์ไม่รองรับ", "กรุณาใช้ Chrome หรือ Safari เวอร์ชั่นล่าสุด");
                    return;
                }

                try {
                    // ปิดกล้องเดิมก่อนเปิดใหม่ (ใช้กรณีสลับกล้อง)
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }

                    this.stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: this.currentFacingMode, width: { ideal: 720 }, height: { ideal: 720 } }
                    });

                    this.video.srcObject = this.stream;
                    this.video.setAttribute("playsinline", true);
                    this.videoTrack = this.stream.getVideoTracks()[0];

                    // เช็คว่าใช้กล้องหน้าหรือหลังเพื่อกลับด้านภาพ
                    const settings = this.videoTrack.getSettings();
                    if (settings.facingMode === 'user' || this.currentFacingMode === 'user') {
                        this.video.style.transform = "scaleX(-1)";
                    } else {
                        this.video.style.transform = "scaleX(1)";
                    }

                    this.video.onloadedmetadata = () => {
                        this.video.play();
                        this.isScanning = true;

                        // ปิด Overlay ซ่อนข้อความโหลด
                        DOM.cameraOverlay.style.opacity = '0';
                        setTimeout(() => DOM.cameraOverlay.style.display = 'none', 300);

                        // แสดง UI กล้อง
                        DOM.scanFrame.style.display = 'block';
                        DOM.cameraControls.classList.remove('hidden');

                        // ตรวจสอบว่ากล้องรองรับแฟลชหรือไม่
                        const hasTorch = this.videoTrack.getCapabilities && this.videoTrack.getCapabilities().torch;
                        if (hasTorch && this.currentFacingMode === 'environment') {
                            DOM.btnFlash.classList.remove('hidden');
                        } else {
                            DOM.btnFlash.classList.add('hidden');
                        }

                        DOM.btnStart.classList.add('hidden');
                        DOM.btnStop.classList.remove('hidden');
                        requestAnimationFrame(() => this.tick());
                    };
                } catch (err) {
                    console.error("Camera Error:", err);
                    APP.showError("ไม่สามารถเข้าถึงกล้องได้", "หากระบบบล็อกกล้อง ให้ตรวจสอบสิทธิ์กล้องในการตั้งค่าเบราว์เซอร์");
                }
            },

            switchCamera: function () {
                // สลับโหมดกล้อง
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                this.isTorchOn = false;
                DOM.iconFlash.setAttribute('fill', 'none');

                // แสดง overlay โหลดแปบนึง
                DOM.cameraOverlay.style.display = 'flex';
                DOM.cameraOverlay.style.opacity = '1';
                DOM.scanFrame.style.display = 'none';
                DOM.cameraControls.classList.add('hidden');

                this.start();
            },

            toggleFlash: async function () {
                if (this.videoTrack) {
                    try {
                        const capabilities = this.videoTrack.getCapabilities();
                        if (capabilities.torch) {
                            this.isTorchOn = !this.isTorchOn;
                            await this.videoTrack.applyConstraints({
                                advanced: [{ torch: this.isTorchOn }]
                            });

                            // เปลี่ยนสีไอคอนแฟลชตอนเปิด
                            if (this.isTorchOn) {
                                DOM.iconFlash.setAttribute('fill', 'currentColor');
                                DOM.iconFlash.classList.add('text-yellow-400');
                            } else {
                                DOM.iconFlash.setAttribute('fill', 'none');
                                DOM.iconFlash.classList.remove('text-yellow-400');
                            }
                        }
                    } catch (err) {
                        console.error("Flash error:", err);
                    }
                }
            },

            tick: function () {
                if (this.video.readyState === this.video.HAVE_ENOUGH_DATA && this.isScanning) {
                    const ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                    this.canvas.height = this.video.videoHeight;
                    this.canvas.width = this.video.videoWidth;
                    ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);

                    const imageData = ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                    if (code && code.data && !APP.isProcessing) {
                        this.pause();
                        APP.verifyUser(code.data);
                        return;
                    }
                }
                if (this.isScanning) requestAnimationFrame(() => this.tick());
            },

            stop: function () {
                this.isScanning = false;
                this.isTorchOn = false;
                if (this.stream) this.stream.getTracks().forEach(track => track.stop());
                this.video.srcObject = null;
                this.videoTrack = null;

                DOM.scanFrame.style.display = 'none';
                DOM.cameraControls.classList.add('hidden');
                DOM.iconFlash.setAttribute('fill', 'none');
                DOM.iconFlash.classList.remove('text-yellow-400');

                DOM.cameraOverlay.style.display = 'flex';
                void DOM.cameraOverlay.offsetWidth;
                DOM.cameraOverlay.style.opacity = '1';

                DOM.btnStop.classList.add('hidden');
                DOM.btnStart.classList.remove('hidden');
            },

            pause: function () {
                this.isScanning = false;
                DOM.scanFrame.style.display = 'none';
            },
            resume: function () {
                if (!this.isScanning && this.stream && this.stream.active) {
                    this.isScanning = true;
                    DOM.scanFrame.style.display = 'block';
                    requestAnimationFrame(() => this.tick());
                } else if (!this.stream || !this.stream.active) {
                    this.start();
                }
            }
        };

        const APP = {
            currentMode: "scan",
            isProcessing: false,
            pendingId: null,

            init: function () {
                this.fetchConfigs();
            },

            switchMode: function (mode) {
                if (this.currentMode === mode) return;
                this.currentMode = mode;

                const activeTabClass = "flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white text-gray-900 shadow-sm transition-all duration-200";
                const inactiveTabClass = "flex-1 py-2.5 text-sm font-semibold rounded-lg text-gray-500 hover:text-gray-900 transition-all duration-200";

                if (mode === 'scan') {
                    DOM.scanWrapper.classList.remove('hidden');
                    DOM.manualWrapper.classList.add('hidden');
                    DOM.modeScanBtn.className = activeTabClass;
                    DOM.modeManualBtn.className = inactiveTabClass;
                    SCANNER.resume();
                } else {
                    DOM.scanWrapper.classList.add('hidden');
                    DOM.manualWrapper.classList.remove('hidden');
                    DOM.modeManualBtn.className = activeTabClass;
                    DOM.modeScanBtn.className = inactiveTabClass;
                    SCANNER.stop();
                    DOM.manualIdInput.focus();
                }
            },

            fetchConfigs: async function () {
                DOM.placeSelect.innerHTML = '<option value="">กำลังโหลด...</option>';
                DOM.roundSelect.innerHTML = '<option value="">กำลังโหลด...</option>';

                try {
                    const data = await fetchAPI("getConfigs");
                    if (data.status === "success") {
                        DOM.placeSelect.innerHTML = data.places.map(p => `<option value="${p}">${p}</option>`).join('');
                        DOM.roundSelect.innerHTML = data.times.map(t => `<option value="${t}">${t}</option>`).join('');
                    } else {
                        DOM.placeSelect.innerHTML = `<option value="">โหลดผิดพลาด</option>`;
                        DOM.roundSelect.innerHTML = `<option value="">โหลดผิดพลาด</option>`;
                        APP.showError("ไม่สามารถโหลดตั้งค่าได้", data.message);
                    }
                } catch (err) {
                    console.error(err);
                    DOM.placeSelect.innerHTML = '<option value="">เชื่อมต่อ API ไม่ได้</option>';
                    DOM.roundSelect.innerHTML = '<option value="">เชื่อมต่อ API ไม่ได้</option>';
                    APP.showError("เกิดข้อผิดพลาด", err.message);
                }
            },

            verifyUser: async function (rawId) {
                if (this.isProcessing) return;

                const id = String(rawId).trim();
                if (!/^\d{5}$/.test(id)) {
                    this.showError("ข้อมูลไม่ถูกต้อง", "คิวอาร์โค้ดหรือรหัสไม่ตรงตามรูปแบบ (ตัวเลข 5 หลัก)");
                    return;
                }

                this.isProcessing = true;
                this.pendingId = id;
                this.openModal("loading", "กำลังค้นหาข้อมูล", `ID: ${id}`);

                try {
                    const res = await fetchAPI("verifyUser", { id: id });
                    if (res.status === 'success') {
                        this.openModal("confirm", "ตรวจสอบข้อมูล", "ยืนยันการทำรายการหรือไม่?", res.data);
                    } else {
                        this.openModal("error", "ไม่พบข้อมูล", res.message || "ไม่มีข้อมูลรหัสนี้ในระบบ");
                    }
                } catch (err) {
                    this.openModal("error", "ขัดข้อง", err.message || "ไม่สามารถติดต่อฐานข้อมูลได้");
                }
            },

            processManualEntry: function () {
                const val = DOM.manualIdInput.value;
                if (val.length === 5) {
                    this.verifyUser(val);
                } else {
                    this.showError("รหัสไม่ครบถ้วน", "กรุณากรอกรหัสประจำตัวให้ครบ 5 หลัก");
                }
            },

            confirmCheckIn: async function () {
                const id = this.pendingId;
                const round = DOM.roundSelect.value;
                const place = DOM.placeSelect.value;

                if (!round || !place || round === "" || place === "") {
                    this.showError("ข้อมูลไม่ครบ", "กรุณาเลือกรอบเวลาและจุดตรวจสอบด้านบนให้เรียบร้อย");
                    return;
                }

                this.openModal("loading", "กำลังบันทึก", "กรุณารอสักครู่...");

                try {
                    const res = await fetchAPI("processCheckIn", { id: id, round: round, place: place });
                    if (res.status === 'success') {
                        this.openModal("success", "เช็คอินสำเร็จ", `เวลา ${new Date().toLocaleTimeString('th-TH')}`, res.data);
                        this.playBeep();
                        DOM.manualIdInput.value = '';
                    } else {
                        this.openModal("error", "บันทึกไม่สำเร็จ", res.message);
                    }
                } catch (err) {
                    this.openModal("error", "ขัดข้อง", err.message || "ไม่สามารถบันทึกข้อมูลได้");
                }
            },

            showError: function (title, msg) {
                this.isProcessing = true;
                SCANNER.pause();
                this.openModal("error", title, msg);
            },

            openModal: function (state, title, msg, data = null) {
                DOM.resultModal.classList.remove('opacity-0', 'pointer-events-none');
                DOM.modalContent.classList.remove('scale-95');
                DOM.modalContent.classList.add('scale-100');

                DOM.modalTitle.innerText = title;
                DOM.modalMessage.innerText = msg;

                DOM.modalConfirmActions.classList.add('hidden');
                DOM.modalCloseActions.classList.add('hidden');
                DOM.modalUserData.classList.add('hidden');
                DOM.modalExtraInfo.classList.remove('flex');
                DOM.modalExtraInfo.classList.add('hidden');
                DOM.modalTitle.className = "text-xl font-bold text-gray-900";

                if (state === "loading") {
                    // Just text
                } else if (state === "confirm") {
                    DOM.modalUserData.classList.remove('hidden');
                    DOM.modalUserId.innerText = this.pendingId;
                    DOM.modalUserName.innerText = `${data.firstName || ''} ${data.lastName || ''} ${data.nickname ? '(' + data.nickname + ')' : ''}`.trim();
                    DOM.modalUserBaan.innerText = data.baan || '-';
                    DOM.modalConfirmActions.classList.remove('hidden');
                } else if (state === "success") {
                    DOM.modalUserData.classList.remove('hidden');
                    if (data) {
                        DOM.modalUserId.innerText = this.pendingId;
                        DOM.modalUserName.innerText = `${data.firstName || ''} ${data.lastName || ''} ${data.nickname ? '(' + data.nickname + ')' : ''}`.trim();
                        DOM.modalUserBaan.innerText = data.baan || '-';
                    }

                    // แสดงรอบและสถานที่
                    DOM.modalExtraInfo.classList.remove('hidden');
                    DOM.modalExtraInfo.classList.add('flex');
                    DOM.modalUserRound.innerText = DOM.roundSelect.options[DOM.roundSelect.selectedIndex].text;
                    DOM.modalUserPlace.innerText = DOM.placeSelect.options[DOM.placeSelect.selectedIndex].text;

                    DOM.modalTitle.className = "text-xl font-bold text-green-600";
                    DOM.modalCloseActions.classList.remove('hidden');
                    DOM.btnCloseModal.className = "w-full bg-green-600 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-green-700 active:scale-95 transition-all";
                } else if (state === "error") {
                    DOM.modalTitle.className = "text-xl font-bold text-red-600";
                    DOM.modalCloseActions.classList.remove('hidden');
                    DOM.btnCloseModal.className = "w-full bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black active:scale-95 transition-all";
                }
            },

            closeModal: function () {
                DOM.resultModal.classList.add('opacity-0', 'pointer-events-none');
                DOM.modalContent.classList.add('scale-95');
                DOM.modalContent.classList.remove('scale-100');

                this.isProcessing = false;

                if (this.currentMode === 'scan') {
                    setTimeout(() => SCANNER.resume(), 300);
                } else {
                    DOM.manualIdInput.focus();
                }
            },

            cancelCheckIn: function () {
                this.closeModal();
            },

            playBeep: function () {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } catch (e) { console.log("Audio not supported"); }
            }
        };

        window.APP = APP;
        window.SCANNER = SCANNER;

        document.addEventListener("DOMContentLoaded", () => {
            APP.init();
        });
    </script>
</body>
